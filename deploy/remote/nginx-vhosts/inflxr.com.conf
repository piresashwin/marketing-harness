# inflxr.com — sibling vhost served by the SHARED tradex nginx proxy.
#
# This file is NOT mounted from inflxr's stack. deploy.sh copies it to
# /srv/nginx-vhosts on the droplet, which the tradex nginx mounts at
# /etc/nginx/vhosts and includes. That host dir lives OUTSIDE tradex's rsync tree,
# so tradex deploys won't delete it.
#
# inflxr-app is a SINGLE container: one Express process serves the SPA, the REST
# API (/api), magic-link auth (/auth), connector OAuth (/connectors), the MCP
# endpoint (/mcp), /media, and /healthz. So this vhost has ONE upstream and does
# NO path rewriting — everything proxies to inflxr-app:8787.
#
# Reachability: this proxy and inflxr-app share the external `edge` docker network.
# We resolve the upstream at request time via docker's embedded DNS (127.0.0.11) +
# a variable, so the proxy keeps starting/serving even while inflxr-app is down or
# redeploying (a static `upstream` would make nginx fail to start if the container
# were absent).

# Plain HTTP: serve the ACME challenge, redirect everything else to HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name inflxr.com www.inflxr.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://inflxr.com$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name inflxr.com www.inflxr.com;

  ssl_certificate     /etc/letsencrypt/live/inflxr.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/inflxr.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Media uploads arrive as JSON bodies (the app sets express.json limit 25mb in
  # src/index.ts). nginx's 1m default would 413 them — give headroom over 25m.
  client_max_body_size 32m;

  # Redirect the www apex to the canonical host.
  if ($host = www.inflxr.com) { return 301 https://inflxr.com$request_uri; }

  # Runtime DNS resolution so this server block doesn't pin the upstream at startup.
  resolver 127.0.0.11 valid=30s;
  set $inflxr_app inflxr-app:8787;

  # One Express app handles every path (API, auth, MCP, OAuth, media, SPA).
  location / {
    proxy_pass http://$inflxr_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
